project:
  type: website
  output-dir: _site
  # The manuscript is its own render product (Word via docstyle) and reads
  # pipeline targets that fresh clones will not have — keep it out of the site.
  render:
    - "!manuscript/"

website:
  title: "Canadian Smoking Histories Model"
  site-url: https://big-life-lab.github.io/cshm-dev/
  repo-url: https://github.com/Big-Life-Lab/cshm-dev
  repo-actions: [edit, issue]
  page-navigation: true

  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        file: index.qmd
      - text: "Protocol"
        file: docs/protocol/full-protocol.qmd
      - text: "Workflow"
        file: docs/workflow/index.qmd
      - text: "How-to guides"
        file: docs/how-to/index.qmd
      - text: "Explanations"
        file: docs/explanation/index.qmd
      - text: "Reference"
        file: docs/reference/index.qmd
    right:
      - icon: github
        href: https://github.com/Big-Life-Lab/cshm-dev
        aria-label: GitHub

  sidebar:
    - title: "Protocol"
      style: "docked"
      contents:
        - docs/protocol/full-protocol.qmd
        - docs/protocol/study-summary.qmd
        - docs/protocol/appendix-imputation.qmd

    - title: "Workflow"
      contents:
        - docs/workflow/index.qmd
        - docs/workflow/1-variable-setup.qmd
        - docs/workflow/2-data-loading.qmd
        - docs/workflow/3-data-cleaning.qmd
        - docs/workflow/4-descriptive-statistics.qmd
        - docs/workflow/5-imputation.qmd
        - docs/workflow/6-descriptive-post-imputation.qmd
        - docs/workflow/7-apc-data-preparation.qmd
        - docs/workflow/8-apc-model.qmd

    - title: "How-to guides"
      contents:
        - docs/how-to/index.qmd
        - docs/how-to/data-loading-and-harmonizing.qmd
        - docs/how-to/processing-cchs-data.qmd
        - docs/how-to/running-apc-model.qmd
        - docs/how-to/generating-histories.qmd
        - docs/how-to/interpreting-results.qmd
        - docs/how-to/validating-results.qmd
        - docs/how-to/custom-models.qmd
        - docs/how-to/integration.qmd
        - docs/how-to/reproducing-ontario-study.qmd

    - title: "Explanations"
      contents:
        - docs/explanation/index.qmd
        - docs/explanation/smoking-history.qmd
        - docs/explanation/apc-method.qmd
        - docs/explanation/validation.qmd
        - docs/explanation/research-applications.qmd

    - title: "Reference"
      contents:
        - docs/reference/index.qmd
        - docs/reference/variables.qmd
        - docs/reference/functions.qmd
        - docs/reference/model.qmd
        - docs/reference/faq.qmd

    - title: "Tutorials"
      contents:
        - docs/tutorials/getting-started.qmd
        - docs/tutorials/basic-usage.qmd
        - docs/tutorials/advanced-usage.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    code-copy: true
    code-tools: true
    highlight-style: github

execute:
  freeze: auto
