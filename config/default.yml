default:
# The default.yml uses the test files within this repository. All test files contain simulated 
# or example data that can be publicly shared.

  # Variable definitions
  variables_path: !expr file.path(getwd(), "config/variables/variables.csv")
  variable_details_path: !expr file.path(getwd(), "config/variables/variable_details.csv")
  
  # Working sheets
  worksheets:
    variables: !expr file.path(getwd(), "worksheets/cshgm-variables-working-copy.csv")
    variable_details: !expr file.path(getwd(), "worksheets/cshgm-variable-details.csv")
  
  # Data configuration
  data_type: ".RData"
  testing_data_cycle: cchs2013_2014_p
  
  # Data paths for development environment
  data:
    cchs2001_p: !expr file.path(getwd(), "data/dev/cchs2001_p.RData")
    cchs2003_p: !expr file.path(getwd(), "data/dev/cchs2003_p.RData")
    cchs2005_p: !expr file.path(getwd(), "data/dev/cchs2005_p.RData")
    cchs2007_2008_p: !expr file.path(getwd(), "data/dev/cchs2007_2008_p.RData")
    cchs2009_2010_p: !expr file.path(getwd(), "data/dev/cchs2009_2010_p.RData")
    cchs2012_p: !expr file.path(getwd(), "data/dev/cchs2012_p.RData")
    cchs2013_2014_p: !expr file.path(getwd(), "data/dev/cchs2013_2014_p.RData")
  
  # Model parameters
  exclude_age_category: 1
  
  # Logging configuration
  log_level: "INFO"
  log_file: !expr file.path(getwd(), "logs/cshgm.log")
  
  # APC model specifications
  age_knots: [10, 15, 20, 50, 60]
  period_knots: [1940, 1950, 1960, 1970, 1980]
  cohort_knots: [1930, 1940, 1945, 1950, 1955, 1960, 1965, 1970, 1975, 1980]

prod:
  # Data paths for production environment
  data:
    cchs2001_p: !expr file.path(getwd(), "data/prod/cchs2001_p.RData")
    cchs2003_p: !expr file.path(getwd(), "data/prod/cchs2003_p.RData")
    cchs2005_p: !expr file.path(getwd(), "data/prod/cchs2005_p.RData")
    cchs2007_2008_p: !expr file.path(getwd(), "data/prod/cchs2007_2008_p.RData")
    cchs2009_2010_p: !expr file.path(getwd(), "data/prod/cchs2009_2010_p.RData")
    cchs2012_p: !expr file.path(getwd(), "data/prod/cchs2012_p.RData")
    cchs2013_2014_p: !expr file.path(getwd(), "data/prod/cchs2013_2014_p.RData")
  
  # Production logging configuration
  log_level: "WARN"
  log_file: !expr file.path(getwd(), "logs/cshgm-prod.log")
